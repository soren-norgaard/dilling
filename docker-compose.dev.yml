# ============================================
# Dilling E-Commerce — Dev Overrides
# docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ============================================

services:
  app:
    build:
      target: deps
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
