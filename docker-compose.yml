# ============================================
# Dilling E-Commerce — Docker Compose
# One command to rule them all: docker compose up
# ============================================

services:
  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dilling
      POSTGRES_USER: dilling
      POSTGRES_PASSWORD: dilling_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dilling"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- Meilisearch ----
  search:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-dilling_search_key_2026}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - msdata:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- Next.js Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://dilling:dilling_dev_2026@db:5432/dilling
      MEILISEARCH_HOST: http://search:7700
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-dilling_search_key_2026}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
      PORT: "4000"
    depends_on:
      db:
        condition: service_healthy
      search:
        condition: service_healthy

volumes:
  pgdata:
  msdata:
